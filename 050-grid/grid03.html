<!DOCTYPE html>
<html lang="de-ch">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>grid</title>
    <link rel="stylesheet" href="/000-shared/reset.css" />
    <link rel="stylesheet" href="/000-shared/variables.css" />
    <style>
      body {
        padding: 1rem;
        background-color: var(--gray9);
        color: var(--gray2);
      }
      h1 {
        font-weight: bold;
        font-size: 2rem;
      }
      p {
        margin-bottom: 1rem;
      }

      .gallery {
        display: grid;
        gap: 8px;
        /* repeat-funktion zum einfachen wiederholen */
        /* 1fr = 1 fraction, ähnlich flex: 1 bei flexbox */
        grid-template-columns: repeat(2, 1fr);
      }

      /* empfehlenswerte regeln für bilder in einem grid */
      .image {
        width: 100%;
        height: 100%;
        aspect-ratio: 1/1;
        object-fit: cover;
      }

      @media (min-width: 500px) {
        .gallery {
          grid-template-columns: repeat(3, 1fr);
        }
      }
    </style>
  </head>
  <body>
    <h1>Gallery</h1>
    <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit.</p>

    <div class="gallery">
      <img
        class="image"
        src="https://via.placeholder.com/400x400?text=A"
        alt="???"
      />
      <img
        class="image"
        src="https://via.placeholder.com/400x400?text=B"
        alt="???"
      />
      <img
        class="image"
        src="https://via.placeholder.com/400x400?text=C"
        alt="???"
      />
      <img
        class="image"
        src="https://via.placeholder.com/400x400?text=D"
        alt="???"
      />
      <img
        class="image"
        src="https://via.placeholder.com/400x400?text=E"
        alt="???"
      />
      <img
        class="image"
        src="https://via.placeholder.com/400x400?text=F"
        alt="???"
      />
    </div>
  </body>
</html>
