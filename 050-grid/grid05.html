<!DOCTYPE html>
<html lang="de-ch">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>grid</title>
    <link rel="stylesheet" href="/000-shared/reset.css" />
    <link rel="stylesheet" href="/000-shared/variables.css" />
    <style>
      body {
        background-color: var(--gray9);
        color: var(--gray2);
      }

      @media (min-width: 500px) {
        .layout {
          height: 100vh;
          display: grid;
          grid-template-columns: 200px 1fr;
          grid-template-rows: 3rem 1fr 2rem;
          grid-template-areas:
            "top top"
            "left main"
            "left bottom";
        }
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <nav style="grid-area: top; background: var(--gray7)">nav</nav>
      <aside style="grid-area: left; background: var(--gray8)">aside</aside>
      <main style="grid-area: main">main</main>
      <footer style="grid-area: bottom; background: black">footer</footer>
    </div>
  </body>
</html>
