<!DOCTYPE html>
<html lang="de-ch">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="/css/style.css" />
  </head>

  <body>
    <!-- see also:  https://mozilladevelopers.github.io/playground/css-grid-->

    <section
      class="box"
      style="
        display: grid;
        grid-auto-flow: row;
        gap: 8px;
        grid-template-columns: 80px 80px 80px;
        grid-template-rows: 80px 80px 80px;
        justify-content: start;
        align-content: start;
        /*height: 400px;*/
        justify-items: stretch;
        align-items: stretch;
      "
    >
      <div class="box">1</div>
      <div class="box">2</div>
      <div class="box">3</div>
      <div class="box">4</div>
      <div class="box">5</div>
      <div class="box" style="grid-row: span 1">6</div>
      <div class="box" style="grid-column: span 3">7</div>
    </section>

    <section
      class="box"
      style="
        display: grid;
        gap: 8px;
        grid-template-columns: repeat(3, 80px);
        grid-template-rows: repeat(3, 80px);
      "
    >
      <!-- grid-area: y start / x start / span height / span width -->
      <div
        class="box"
        style="grid-area: 1 / 2 / span 3 / span 1; background: #0000ff80"
      >
        a
      </div>

      <!-- grid-area: y start / x start / y end / x end -->
      <div class="box" style="grid-area: 2 / 1 / 3 / -1; background: #ff000080">
        b
      </div>
    </section>
  </body>
</html>
