<!DOCTYPE html>
<html lang="de-ch">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="/css/style.css" />
  </head>

  <body>
    <!-- show the effects of the various rules -->
    <section
      class="box"
      style="display: flex; gap: 8px; flex-direction: row; flex-wrap: wrap"
    >
      <div class="box">1</div>
      <div class="box">2</div>
      <div class="box">3</div>
      <div class="box">4</div>
      <div class="box">5</div>
    </section>

    <section class="box" style="display: flex; gap: 8px">
      <div class="box">1</div>
      <div class="box" style="flex-grow: 1">2</div>
      <div class="box">3</div>
    </section>

    <section
      class="box"
      style="
        height: 200px;
        display: flex;
        gap: 8px;
        flex-direction: row;
        justify-content: center;
        align-items: center;
      "
    >
      <div class="box">1</div>
      <div class="box" style="align-self: stretch">2</div>
      <div class="box">3</div>
    </section>

    <section style="display: flex; gap: 8px">
      <div class="box" style="order: 3">1</div>
      <div class="box" style="order: 2">2</div>
      <div class="box" style="order: 1">3</div>
    </section>
  </body>
</html>
