<!DOCTYPE html>
<html lang="de-ch">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="/css/style.css" />
    <style>
      /* default */
      .page-title {
        font-size: 2rem;
      }
      .number-grid {
        display: grid;
        gap: 8px;
        grid-template-columns: repeat(1, 1fr);
      }

      /* if screen width >= 768px (tablet) */
      @media (min-width: 768px) {
        .page-title {
          font-size: 4rem;
        }
        .number-grid {
          grid-template-columns: repeat(2, 1fr);
        }
      }

      /* if screen width >= 1280px (desktop) */
      @media (min-width: 1280px) {
        .page-title {
          font-size: 8rem;
        }
        .number-grid {
          grid-template-columns: repeat(3, 1fr);
        }
      }

      /* alternative utility css approach (as implemented in tailwind) */
      .grid {
        display: grid;
      }
      .gap {
        gap: 8px;
      }
      .grid-cols-1 {
        grid-template-columns: repeat(1, 1fr);
      }
      .grid-cols-2 {
        grid-template-columns: repeat(2, 1fr);
      }
      .grid-cols-3 {
        grid-template-columns: repeat(3, 1fr);
      }
      @media (min-width: 768px) {
        .md\:grid-cols-1 {
          grid-template-columns: repeat(1, 1fr);
        }
        .md\:grid-cols-2 {
          grid-template-columns: repeat(2, 1fr);
        }
        .md\:grid-cols-3 {
          grid-template-columns: repeat(3, 1fr);
        }
      }
      @media (min-width: 1280px) {
        .lg\:grid-cols-1 {
          grid-template-columns: repeat(1, 1fr);
        }
        .lg\:grid-cols-2 {
          grid-template-columns: repeat(2, 1fr);
        }
        .lg\:grid-cols-3 {
          grid-template-columns: repeat(3, 1fr);
        }
      }
    </style>
  </head>

  <body>
    <h1 class="page-title">breakpoints</h1>
    <p>media queries for certain screen sizes.</p>
    <div class="number-grid">
      <div class="box">1</div>
      <div class="box">2</div>
      <div class="box">3</div>
      <div class="box">4</div>
      <div class="box">5</div>
      <div class="box">6</div>
    </div>
    <hr />
    <div class="grid gap grid-cols-1 md:grid-cols-2 lg:grid-cols-3">
      <div class="box">1</div>
      <div class="box">2</div>
      <div class="box">3</div>
      <div class="box">4</div>
      <div class="box">5</div>
      <div class="box">6</div>
    </div>
  </body>
</html>
