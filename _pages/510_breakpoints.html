<!DOCTYPE html>
<html lang="de-ch">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="/css/style.css" />
    <style>
      /* default */
      .heading {
        font-size: 2rem;
      }
      .grid {
        display: grid;
        gap: 8px;
        grid-template-columns: repeat(1, 1fr);
      }

      /* if screen width >= 768px (tablet) */
      @media (min-width: 768px) {
        .heading {
          font-size: 4rem;
        }
        .grid {
          grid-template-columns: repeat(2, 1fr);
        }
      }

      /* if screen width >= 1280px (desktop) */
      @media (min-width: 1280px) {
        .heading {
          font-size: 8rem;
        }
        .grid {
          grid-template-columns: repeat(3, 1fr);
        }
      }
    </style>
  </head>

  <body>
    <h1 class="heading">breakpoints</h1>
    <p>media queries for certain screen sizes.</p>
    <div class="grid">
      <div class="box">1</div>
      <div class="box">2</div>
      <div class="box">3</div>
      <div class="box">4</div>
      <div class="box">5</div>
      <div class="box">6</div>
    </div>
  </body>
</html>
