<!DOCTYPE html>
<html lang="de-ch">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="/css/style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        color: white;
        font-family: "Press Start 2P", monospace;
        margin: 0;
        zoom: 2;
      }
      .game {
        background-color: #5c93fc;
        image-rendering: pixelated;
        width: 320px;
        height: 160px;
        display: flex;
        flex-direction: column;
      }
      .flex {
        display: flex;
      }
      .ground {
        background-image: url("/assets/sprites/ground.png");
        width: 16px;
        height: 16px;
        background-repeat: repeat;
      }
      .block {
        background-image: url("/assets/sprites/block.png");
        width: 16px;
        height: 16px;
        background-repeat: repeat;
      }
      .goomba {
        background-image: url("/assets/sprites/goomba.png");
        width: 16px;
        height: 16px;
      }
      .mario {
        background-image: url("/assets/sprites/mario.png");
        width: 16px;
        height: 16px;
      }
    </style>
  </head>
  <body>
    <div class="game">
      <div
        class="flex"
        style="
          font-size: 8px;
          justify-content: space-between;
          padding: 8px;
          margin-bottom: auto;
        "
      >
        <span>Mario</span>
        <span>World 1-1</span>
        <span>Time 300</span>
      </div>
      <div class="flex">
        <div class="mario" style="margin: 0 16px"></div>
        <div class="block" style=""></div>
        <div class="goomba" style="margin: 0 16px"></div>
        <div class="block" style="width: 48px"></div>
        <div class="goomba" style="margin-left: auto"></div>
        <div class="block" style=""></div>
      </div>
      <div class="flex">
        <div class="ground" style="flex-grow: 1"></div>
      </div>
    </div>
  </body>
</html>
