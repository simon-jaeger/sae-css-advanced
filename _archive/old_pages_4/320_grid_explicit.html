<!doctype html>
<html lang="en-us">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="/assets/global.css" />
  <style>
    section {
      display: grid;
      gap: 8px;
      grid-template-columns: repeat(3, 80px);
      grid-template-rows: repeat(3, 80px);
      border: 1px solid;
      padding: 8px;
      width: min-content;
    }

    div {
      padding: 16px;
      border: 1px solid;
      mix-blend-mode: screen;
    }

    div.red {
      background: #800;
      grid-column: 2/3;
      grid-row: 1/4;
    }

    div.green {
      background: #080;
      grid-column: 1/4;
      grid-row: 2/3;
    }

    div.blue {
      background: #008;
      grid-column: 1/3;
      grid-row: 2/4;
    }
  </style>
</head>

<body>
  <section>
    <div class="red"></div>
    <div class="green"></div>
    <div class="blue"></div>
  </section>
</body>
</html>
