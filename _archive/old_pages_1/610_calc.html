<!DOCTYPE html>
<html lang="de-ch">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="/assets/css/global.css" />
    <style>
      body {
        margin: 16px;
        min-height: 2000px;
      }

      :root {
        --someVar: 50px;
        --scroll: 0;
      }
    </style>
    <script>
      window.addEventListener("scroll", () => {
        document.documentElement.style.setProperty(
          "--scroll",
          String(window.scrollY)
        )
      })
    </script>
  </head>

  <body>
    <h1>calc()</h1>

    <div class="box" style="width: 300px">300px</div>

    <div class="box" style="width: calc(100px + 200px)">
      calc(100px + 200px)
    </div>

    <div class="box" style="width: calc(400px - 100px)">
      calc(400px - 100px)
    </div>

    <div class="box" style="width: calc(3 * 100px)">calc(3 * 100px)</div>

    <div class="box" style="width: calc(600px / 2)">calc(600px / 2)</div>

    <div class="box" style="width: calc(6 * var(--someVar))">
      calc(6 * var(--someVar))
    </div>

    <div
      class="box"
      style="
        transform: rotate(calc((var(--scroll) * 0.5deg)));
        width: 40px;
        height: 40px;
        position: fixed;
        top: 20px;
        right: 20px;
      "
    ></div>
  </body>
</html>
