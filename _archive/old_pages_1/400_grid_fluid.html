<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="/assets/css/global.css" />
  </head>

  <body>
    <section
      class="box"
      style="display: grid; gap: 8px; grid-template-columns: repeat(3, 1fr)"
    >
      <div class="box">1</div>
      <div class="box">2</div>
      <div class="box">3</div>
      <div class="box">4</div>
      <div class="box">5</div>
      <div class="box">6</div>
    </section>

    <section
      class="box"
      style="
        display: grid;
        gap: 8px;
        grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      "
    >
      <div class="box">1</div>
      <div class="box">2</div>
      <div class="box">3</div>
      <div class="box">4</div>
      <div class="box">5</div>
      <div class="box">6</div>
    </section>
  </body>
</html>
