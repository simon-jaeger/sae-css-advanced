<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="/assets/global.css" />
    <style>
      .truncate {
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
    </style>
  </head>

  <body>
    <h1>text-overflow</h1>
    <ul class="box">
      <li class="truncate">
        Through the Looking-Glass, and What Alice Found There
      </li>
      <li class="truncate">The Wonderful Wizard of Oz</li>
      <li class="truncate">The Strange Case of Dr. Jekyll and Mr. Hyde</li>
    </ul>
  </body>
</html>
