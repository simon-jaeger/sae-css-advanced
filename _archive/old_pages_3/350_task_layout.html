<!doctype html>
<html lang="en-us">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="/assets/css/global.css" />
    <style>
      body {
        margin: 0;
      }

      .discord {
        height: 100vh;
        display: grid;
        grid-template-columns: 80px 120px 1fr 120px;
        grid-template-rows: 40px 1fr 40px;
      }

      .discord > * {
        padding: 8px;
        /*border: 1px solid orange;*/
      }

      .servers {
        grid-row: span 3;
        background: #1e1f22;
      }

      .settings {
        background: #2b2d31;
        border-bottom: 1px solid black;
      }

      .channels {
        background: #2b2d31;
      }

      .topbar {
        grid-column: span 2;
        background: #313338;
        border-bottom: 1px solid black;

        display: flex;
        gap: 8px;
        align-items: center;
        justify-content: space-between;
      }

      .feed {
        background: #313338;
        overflow-y: auto;
      }

      .users {
        grid-row: span 2;
        background: #2b2d31;
      }

      .account {
        background: #232428;
      }

      .message {
        background: #383a40;
      }
    </style>
  </head>

  <body>
    <section class="discord">
      <div class="servers">servers</div>
      <div class="settings">settings</div>
      <div class="topbar">
        <h4>#example</h4>
        <span>icons</span>
      </div>
      <div class="channels">channels</div>
      <main class="feed">
        <h2>Welcome to #example</h2>
        <p>This is the start of the #example channel.</p>
        <p>Lorem ipsum dolor sit amet.</p>
        <p>Lorem ipsum dolor sit amet.</p>
        <p>Lorem ipsum dolor sit amet.</p>
        <p>Lorem ipsum dolor sit amet.</p>
        <p>Lorem ipsum dolor sit amet.</p>
        <p>Lorem ipsum dolor sit amet.</p>
      </main>
      <div class="users">users</div>
      <div class="account">account</div>
      <div class="message">
        <input aria-label="msg" placeholder="message" />
      </div>
    </section>
  </body>
</html>
