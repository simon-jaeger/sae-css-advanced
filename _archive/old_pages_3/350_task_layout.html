<!doctype html>
<html lang="en-us">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="/assets/css/global.css" />
    <style>
      body {
        margin: 0;
      }

      .discord {
        height: 100vh;
        display: grid;
        grid-template-columns: 80px 120px 1fr 120px;
        grid-template-rows: 40px 1fr 40px;

        &>* {
          padding: 8px;
        }
      }

      .servers {
        grid-row: span 3;
        background: #1e1f22;
      }

      .settings {
        background: #2b2d31;
        border-bottom: 1px solid black;
      }

      .channels {
        background: #2b2d31;
      }

      .topbar {
        grid-column: span 2;
        background: #313338;
        border-bottom: 1px solid black;

        display: flex;
        gap: 8px;
        align-items: center;

        h4 {
          margin-right: auto;
        }
      }

      .feed {
        background: #313338;
        overflow-y: auto;
      }

      .users {
        grid-row: span 2;
        background: #2b2d31;
      }

      .account {
        background: #232428;
      }

      .message {
        background: #383a40;

        input {
          width: 100%;
        }
      }
    </style>
  </head>

  <body>
    <div class="discord">
      <aside class="servers">servers</aside>
      <div class="settings">settings</div>
      <header class="topbar">
        <h4>#example</h4>
        <span>A</span>
        <span>B</span>
        <span>C</span>
      </header>
      <aside class="channels">channels</aside>
      <main class="feed">
        <h2>Welcome to #example</h2>
        <p>This is the start of the #example channel.</p>
        <p>Lorem ipsum dolor sit amet.</p>
        <p>Lorem ipsum dolor sit amet.</p>
        <p>Lorem ipsum dolor sit amet.</p>
        <p>Lorem ipsum dolor sit amet.</p>
        <p>Lorem ipsum dolor sit amet.</p>
        <p>Lorem ipsum dolor sit amet.</p>
      </main>
      <aside class="users">users</aside>
      <footer class="account">account</footer>
      <footer class="message">
        <input aria-label="msg" placeholder="message">
      </footer>
    </div>
  </body>
</html>
