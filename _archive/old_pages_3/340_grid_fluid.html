<!doctype html>
<html lang="en-us">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="/assets/css/global.css" />
    <style>
      div {
        padding: 16px;
        border: 1px solid;
      }

      section:nth-child(1) {
        display: grid;
        gap: 8px;
        grid-template-columns: repeat(3, 1fr);
      }

      section:nth-child(2) {
        margin-top: 40px;
        display: grid;
        gap: 8px;
        grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      }
    </style>
  </head>

  <body>
    <section>
      <div>1</div>
      <div>2</div>
      <div>3</div>
      <div>4</div>
      <div>5</div>
      <div>6</div>
    </section>

    <section>
      <div>1</div>
      <div>2</div>
      <div>3</div>
      <div>4</div>
      <div>5</div>
      <div>6</div>
    </section>
  </body>
</html>
