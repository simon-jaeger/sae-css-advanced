<!doctype html>
<html lang="en-us">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="/assets/css/global.css" />
    <style>
      section {
        display: grid;
        gap: 8px;
        grid-template-columns: repeat(3, 80px);
        grid-template-rows: repeat(3, 80px);
        border: 1px solid;
        padding: 8px;
        width: min-content;
      }

      div {
        padding: 16px;
        border: 1px solid;
        opacity: 0.5;
      }

      div:nth-child(1) {
        background: red;
        grid-column: 1/2;
        grid-row: 1/2;
      }

      div:nth-child(2) {
        background: green;
        grid-column: 2/3;
        grid-row: 1/2;
      }

      div:nth-child(3) {
        background: blue;
        grid-column: 3/4;
        grid-row: 1/2;
      }
    </style>
  </head>

  <body>
    <section>
      <div>1</div>
      <div>2</div>
      <div>3</div>
    </section>
  </body>
</html>
