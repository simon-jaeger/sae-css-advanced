<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="/assets/css/global.css" />
    <style>
      body {
        margin: 30px;
        background: #222;
      }
      .sprite {
        display: grid;
        grid-template-columns: repeat(16, 30px);
        grid-template-rows: repeat(16, 30px);
        width: min-content;
        background: white;
      }
    </style>
  </head>
  <body>
    <article class="sprite">
      <!-- background -->
      <div style="background: #fc9838; grid-column: 2/16; grid-row: 2/16"></div>

      <!-- border -->
      <div style="background: #c84c0c; grid-column: 1/2; grid-row: 2/16"></div>
      <div style="background: #c84c0c; grid-column: 2/16; grid-row: 1/2"></div>
      <div style="background: #000000; grid-column: 16/17; grid-row: 2/17"></div>
      <div style="background: #000000; grid-column: 2/17; grid-row: 16/17"></div>

      <!-- dots -->
      <div style="background: #000000; grid-column: 3/4; grid-row: 3/4"></div>
      <div style="background: #000000; grid-column: 14/15; grid-row: 3/4"></div>
      <div style="background: #000000; grid-column: 3/4; grid-row: 14/15"></div>
      <div style="background: #000000; grid-column: 14/15; grid-row: 14/15"></div>

      <!-- questionmark (shadow) -->
      <div style="background: #000000; grid-column: 7/12; grid-row: 5/5;"></div>
      <div style="background: #000000; grid-column: 6/8; grid-row: 6/9;"></div>
      <div style="background: #000000; grid-column: 11/13; grid-row: 6/9;"></div>
      <div style="background: #000000; grid-column: 10/13; grid-row: 9/9;"></div>
      <div style="background: #000000; grid-column: 9/11; grid-row: 10/12;"></div>
      <div style="background: #000000; grid-column: 9/11; grid-row: 13/15;"></div>

      <!-- questionmark (main) -->
      <div style="background: #c84c0c; grid-column:6/11; grid-row: 4/5;"></div>
      <div style="background: #c84c0c; grid-column:5/7; grid-row: 5/8;"></div>
      <div style="background: #c84c0c; grid-column:10/12; grid-row: 5/8;"></div>
      <div style="background: #c84c0c; grid-column:9/12; grid-row: 8/9;"></div>
      <div style="background: #c84c0c; grid-column:8/10; grid-row: 9/11;"></div>
      <div style="background: #c84c0c; grid-column:8/10; grid-row: 12/14;"></div>
    </article>
  </body>
</html>
