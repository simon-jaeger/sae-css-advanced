<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="/assets/css/global.css" />
    <style>
      div {
        padding: 16px;
        border: 1px solid;
      }

      .heading {
        font-size: 2rem;
      }

      .flex {
        display: flex;
        gap: 1rem;
        flex-direction: column;
      }

      .grid {
        display: grid;
        gap: 1rem;
        grid-template-columns: 1fr;
      }

      @media (min-width: 768px) {
        .heading {
          font-size: 4rem;
        }

        .flex {
          flex-direction: row;
        }

        .grid {
          grid-template-columns: 1fr 1fr;
        }
      }

      @media (min-width: 1280px) {
        .heading {
          font-size: 8rem;
        }

        .grid {
          grid-template-columns: 1fr 1fr 1fr;
        }
      }
    </style>
  </head>

  <body>
    <h1 class="heading">Breakpoints</h1>
    <div class="flex">
      <div>a</div>
      <div>b</div>
      <div>c</div>
    </div>
    <div class="grid">
      <div>a</div>
      <div>b</div>
      <div>c</div>
      <div>d</div>
      <div>e</div>
      <div>f</div>
    </div>
  </body>
</html>
