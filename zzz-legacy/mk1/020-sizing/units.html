<!DOCTYPE html>
<html lang="de-ch">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Einheiten</title>
    <link rel="stylesheet" href="/pages/reset.css" />
    <link rel="stylesheet" href="/pages/variables.css" />
    <style>
      :root {
        font-size: 16px; /* 1rem = :root font-size (16px falls nicht anders definiert) */
      }
      body {
        background: var(--gray9);
        color: var(--gray3);
        padding: 16px;
      }
      body > * {
        margin-bottom: 16px;
      }
      .box {
        background: var(--gray7);
        padding: 16px;
        border-top: 1px solid var(--gray5);
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <!-- Explizite Grössen -->
    <div class="box" style="width: 240px">fixed (240px)</div>
    <div class="box" style="width: 10rem">fixed (10rem)</div>

    <!-- Fluide Grössen -->
    <div class="box" style="width: 50vw">fluid (vw)</div>
    <div class="box" style="width: 50%">fluid (%)</div>

    <!-- Intrinsische Grössen -->
    <div class="box" style="width: auto">lorem ipsum (auto)</div>
    <div class="box" style="width: max-content">lorem ipsum (max)</div>
    <div class="box" style="width: min-content">lorem ipsum (min)</div>
  </body>
</html>
