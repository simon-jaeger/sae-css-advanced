<!DOCTYPE html>
<html lang="de-ch">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Limits</title>
    <link rel="stylesheet" href="/pages/reset.css" />
    <link rel="stylesheet" href="/pages/variables.css" />
    <style>
      body {
        background: var(--gray9);
        color: var(--gray3);
        padding: 16px;
      }
      body > * {
        margin-bottom: 16px;
      }
      .box {
        background: var(--gray7);
        padding: 16px;
        border-top: 1px solid var(--gray5);
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <!-- min: den kleineren der beiden werte -->
    <div class="box" style="width: min(100%, 400px)">min</div>

    <!-- max: den grösseren der beiden werte -->
    <div class="box" style="width: max(400px, 100%)">max</div>

    <!-- clamp: minimum, basis, maximum -->
    <div class="box" style="width: clamp(300px, 100%, 500px)">clamp</div>

    <!-- clamp und font-size lassen sich gut kombinieren -->
    <h1
      style="
        text-transform: uppercase;
        font-weight: bold;
        text-align: center;
        font-size: clamp(1rem, 5vw, 2rem);
      "
    >
      Skalier mich
    </h1>

    <!-- text-overflow: schneide lange texte ab -->
    <h1
      style="
        max-width: 200px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      "
    >
      Dieser Titel kann sehr lang sein, und soll dann zugeschnitten werden.
    </h1>
  </body>
</html>
