<!DOCTYPE html>
<html lang="de-ch">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flexbox</title>
    <link rel="stylesheet" href="/pages/reset.css" />
    <link rel="stylesheet" href="/pages/variables.css" />
    <style>
      body {
        background: var(--gray8);
        color: var(--gray3);
        padding: 1rem;
      }
      body > * {
        margin-bottom: 1rem;
      }
      .container {
        background: var(--gray9);
        display: flex;
        gap: 8px;
      }
      .item {
        background: var(--gray7);
        padding: 16px;
        border-top: 1px solid var(--gray5);
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <!--  mit display:flex aktiviert man den flexbox-modus für das layout der direkten kinder -->
    <div class="container">
      <div class="item">r</div>
      <div class="item">o</div>
      <div class="item">w</div>
    </div>

    <!-- flex-direction definiert die richtung: row (x), column (y) -->
    <div class="container" style="flex-direction: column">
      <div class="item">c</div>
      <div class="item">o</div>
      <div class="item">l</div>
    </div>

    <!-- die verteilung entlang der achsen wird definiert mit: justify-content (main axis), align-items (cross axis) -->
    <!-- row: main axis = x, cross axis = y -->
    <!-- column: main axis = y, cross axis = x -->
    <div
      class="container"
      style="
        min-height: 6rem;
        flex-direction: row;
        justify-content: center;
        align-items: center;
      "
    >
      <div class="item">a</div>
      <div class="item">b</div>
      <div class="item">c</div>
    </div>

    <!-- align-self: richtet ein einzelnes kind aus -->
    <!-- order: überschreibt die natürliche reihenfolge eines kindes, vergleichbar mit z-index  -->
    <div class="container" style="min-height: 6rem; align-items: flex-end">
      <div class="item" style="align-self: flex-start">a</div>
      <div class="item" style="order: 999">b</div>
      <div class="item">c</div>
    </div>

    <!-- margin: auto auf einem kind schiebt die geschwister beiseite -->
    <div class="container">
      <div class="item" style="margin-right: auto">m</div>
      <div class="item">au</div>
      <div class="item">to</div>
    </div>

    <!-- flex: 1 auf einem kind lässt es wachsen -->
    <!-- haben mehrere kinder diese eigenschaft, führt eine grössere nummer zu verhältnismässigem wachstum -->
    <div class="container">
      <div class="item" style="flex: 1">1</div>
      <div class="item">0</div>
      <div class="item">0</div>
    </div>
    <div class="container">
      <div class="item">0</div>
      <div class="item" style="flex: 1">1</div>
      <div class="item" style="flex: 2">2</div>
    </div>
    <div class="container">
      <div class="item" style="flex: 1">1</div>
      <div class="item" style="flex: 1">1</div>
      <div class="item" style="flex: 1">1</div>
    </div>

    <!-- mit overflow-x: auto kannst du den container scrollbar machen -->
    <div class="container" style="overflow-x: auto">
      <div class="item">lorem</div>
      <div class="item">ipsum</div>
      <div class="item">dolor</div>
      <div class="item">sit</div>
      <div class="item">amet</div>
      <div class="item">consectetur</div>
      <div class="item">adipiscing</div>
      <div class="item">elit</div>
    </div>
  </body>
</html>
