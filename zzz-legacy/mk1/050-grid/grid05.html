<!DOCTYPE html>
<html lang="de-ch">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>grid</title>
    <link rel="stylesheet" href="/pages/reset.css" />
    <link rel="stylesheet" href="/pages/variables.css" />
    <style>
      body {
        background-color: var(--gray9);
        color: var(--gray2);
      }

      .layout {
        height: 100vh;
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        grid-template-rows: 3rem 1fr 2rem;
        grid-template-areas:
          "left top top"
          "left main main"
          "left bottom bottom";
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <nav style="grid-area: top; background: var(--gray7)">nav</nav>
      <aside style="grid-area: left; background: var(--gray8)">aside</aside>
      <main style="grid-area: main">main</main>
      <footer style="grid-area: bottom; background: black">footer</footer>
      <!--      <aside style="grid-area: left; background: var(&#45;&#45;gray8)">aside</aside>-->
      <!--      <main style="grid-area: main">main</main>-->
      <!--      <footer style="grid-area: bottom; background: black">footer</footer>-->
    </div>
  </body>
</html>
