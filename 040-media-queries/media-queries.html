<!DOCTYPE html>
<html lang="de-ch">
  <head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>media quieries</title>
    <link rel="stylesheet" href="/000-shared/reset.css"/>
    <link rel="stylesheet" href="/000-shared/variables.css"/>
    <style>
      body {
        background: var(--gray1);
        color: var(--gray9);
      }

      .features {
        display: flex;
        flex-direction: column;
        gap: 1rem;
        padding: 1rem;
      }

      .feat {
        flex: 1;
      }
      .feat img {
        width: 100%;
      }
      .feat h2 {
        font-weight: 600;
        text-transform: uppercase;
      }

      /* css regeln, die erst ab dieser viewport-breite ziehen */
      @media (min-width: 400px) {
        .features {
          flex-direction: row;
        }
      }

      /* du kannst so viele breakpoints setzen wie nötig */
      /* gehe vom schmalsten zum breitesten, man nennt das auch mobile-first */
      @media (min-width: 800px) {
        .features {
          max-width: 800px;
          margin: 0 auto;
        }
      }

      /* empfehlenswerte breakpoints (min-widths) */
      /* tablet: 768px */
      /* laptop: 1280px */
      /* desktop: 1920px */
    </style>
  </head>
  <body>
    <ul class="features">
      <li class="feat">
        <img
          class="image"
          src="https://via.placeholder.com/400x400?text=A"
          alt="Product"
        />
        <h2>Alpha</h2>
        <p>Lorem ipsum</p>
      </li>

      <li class="feat">
        <img
          class="image"
          src="https://via.placeholder.com/400x400?text=B"
          alt="Product"
        />
        <h2>Bravo</h2>
        <p>Lorem ipsum</p>
      </li>

      <li class="feat">
        <img
          class="image"
          src="https://via.placeholder.com/400x400?text=C"
          alt="Product"
        />
        <h2>Charlie</h2>
        <p>Lorem ipsum</p>
      </li>
    </ul>
  </body>
</html>
