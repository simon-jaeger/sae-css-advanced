<!DOCTYPE html>
<html lang="de-ch">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="/css/style.css" />
  </head>

  <body>
    <section
      style="
        height: 200px;
        padding: 8px;
        border: 1px dashed;
        display: grid;
        gap: 8px;
        grid-template-columns: 1fr 1fr 1fr;
        grid-template-rows: 1fr 1fr 1fr;
      "
    >
      <div style="background: #999"></div>
      <div style="background: #999"></div>
      <div style="background: #999"></div>
      <div style="grid-column: span 2; background: #099"></div>
      <div style="grid-row: span 2; background: #990"></div>
    </section>
  </body>
</html>
