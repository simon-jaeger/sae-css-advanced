<!doctype html>
<html lang="en-us">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="/assets/css/global.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        margin: 0;
      }

      .game {
        width: 256px;
        height: 160px;
        zoom: 2;
        font-size: 8px;
        font-family: "Press Start 2P", monospace;
        color: white;
        image-rendering: pixelated;
        background-color: #5c93fc;
        display: flex;
        flex-direction: column;
      }

      .hud {
        height: 16px;
        padding: 0 8px;
        margin-bottom: auto;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .blocks {
        display: flex;
        justify-content: end;
        margin-bottom: 16px;
        margin-right: 16px;
      }

      .chars {
        height: 16px;
        display: flex;
        gap: 16px;
        padding: 0 16px;
      }

      .floor {
        height: 16px;
        display: flex;

        .ground {
          flex-grow: 1;
          background-image: url(/assets/images/ground.png);
        }

        .block {
          flex-grow: 1;
          background-image: url(/assets/images/block.png);
        }
      }
    </style>
  </head>

  <body>
    <div class="game">
      <div class="hud">
        <span>Mario</span>
        <span>World 1-1</span>
        <span>Time 300</span>
      </div>
      <div class="blocks">
        <img src="/assets/images/brick.png" alt="" />
        <img src="/assets/images/question.png" alt="" />
        <img src="/assets/images/brick.png" alt="" />
        <img src="/assets/images/question.png" alt="" />
        <img src="/assets/images/brick.png" alt="" />
      </div>
      <div class="chars">
        <img src="/assets/images/mario.png" alt="" />
        <img src="/assets/images/goomba.png" alt="" />
        <img src="/assets/images/goomba.png" alt="" />
        <img src="/assets/images/goomba.png" alt="" />
      </div>
      <div class="floor">
        <div class="ground"></div>
        <div class="block"></div>
      </div>
    </div>
  </body>
</html>
