<!DOCTYPE html>
<html lang="de-ch">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="/css/style.css" />
  </head>

  <body>
    <section
      class="box"
      style="
        display: grid;
        gap: 8px;
        grid-template-columns: 80px 80px 80px;
        grid-template-rows: 40px 40px 40px;
      "
    >
      <div class="box"></div>
      <div class="box"></div>
      <div class="box"></div>
      <div class="box"></div>
      <div class="box"></div>
      <div class="box" style="grid-row: span 2"></div>
      <div class="box" style="grid-column: span 2"></div>
    </section>

    <section
      class="box"
      style="
        display: grid;
        gap: 8px;
        grid-template-columns: 80px 80px 80px;
        grid-template-rows: 40px 40px 40px;
      "
    >
      <div class="box" style="grid-column: 1/3; grid-row: 1/3"></div>
      <div class="box" style="grid-column: 3/4; grid-row: 1/3"></div>
      <div class="box" style="grid-column: 1/4; grid-row: 3/4"></div>
      <div class="box"></div>
      <div class="box"></div>
      <div class="box"></div>
    </section>
  </body>
</html>
