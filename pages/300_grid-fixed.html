<!DOCTYPE html>
<html lang="de-ch">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="/css/style.css" />
  </head>

  <body>
    <section
      class="box"
      style="
        display: grid;
        gap: 8px;
        grid-template-columns: 80px 80px 80px;
        grid-template-rows: 40px 40px 40px;
      "
    >
      <div class="box"></div>
      <div class="box"></div>
      <div class="box"></div>
      <div class="box"></div>
      <div class="box"></div>
      <div class="box" style="grid-row: span 2"></div>
      <div class="box" style="grid-column: span 2"></div>
    </section>

    <section
      class="box"
      style="
        display: grid;
        gap: 8px;
        grid-template-columns: repeat(3, 80px);
        grid-template-rows: repeat(3, 40px);
      "
    >
      <!-- grid-area: y start / x start / span height / span width -->
      <div class="box" style="grid-area: 1 / 2 / span 3 / span 1"></div>

      <!-- grid-area: y start / x start / y end / x end -->
      <div class="box" style="grid-area: 2 / 1 / 3 / -1"></div>
    </section>
  </body>
</html>
