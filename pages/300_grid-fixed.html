<!DOCTYPE html>
<html lang="de-ch">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="/css/style.css" />
  </head>

  <body>
    <section
      style="
        padding: 8px;
        border: 1px solid;
        margin-bottom: 24px;
        display: grid;
        gap: 8px;
        grid-template-columns: 80px 80px 80px;
        grid-template-rows: 40px 40px 40px;
      "
    >
      <div style="background: #999"></div>
      <div style="background: #999"></div>
      <div style="background: #999"></div>
      <div style="background: #999"></div>
      <div style="background: #999"></div>
      <div style="grid-row: span 2; background: #099"></div>
      <div style="grid-column: span 2; background: #990"></div>
    </section>

    <section
      style="
        padding: 8px;
        border: 1px solid;
        margin-bottom: 24px;
        display: grid;
        gap: 8px;
        grid-template-columns: 80px 80px 80px;
        grid-template-rows: 40px 40px 40px;
      "
    >
      <div style="grid-column: 1/4; grid-row: 3/4; background: #9999"></div>
      <div style="grid-column: 3/4; grid-row: 1/4; background: #9999"></div>
      <div style="grid-column: 1/3; grid-row: 1/3; background: #9999"></div>
    </section>
  </body>
</html>
