<!doctype html>
<html lang="en-us">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="/assets/css/global.css" />
    <style>
      section {
        border: 1px solid;
        padding: 16px;
        min-height: 200px;
        display: flex;
        gap: 8px;
        flex-direction: row; /* row, column */
        justify-content: start; /* start, end, center, space-between */
        align-items: start; /* stretch, start, center, end */
        flex-wrap: nowrap; /* nowrap, wrap */
      }

      div {
        display: block;
        padding: 16px;
        border: 1px solid;
      }

      .one {
      }

      .two {
        align-self: end; /* initial, stretch, start, center, end */
      }

      .three {
        flex-grow: 1; /* initial, 0, 1, 2, 3, ... */
      }

      .four {
      }
    </style>
  </head>

  <body>
    <section>
      <div class="one">1</div>
      <div class="two">2</div>
      <div class="three">3</div>
      <div class="four">4</div>
    </section>
  </body>
</html>
