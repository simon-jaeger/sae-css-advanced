<!DOCTYPE html>
<html lang="de-ch">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="/css/style.css" />
    <style></style>
  </head>

  <body>
    <h1>grid</h1>
    <div class="box example" style="
      display: grid;
      gap: 10px;
      grid-auto-flow: row;
      grid-template-columns: 80px 80px 80px 80px;
      grid-template-rows: 80px 80px 80px;
      /*grid-auto-rows: 200px;*/
    ">
      <div class="box">1</div>
      <div class="box">2</div>
      <div class="box">3</div>
      <div class="box">4</div>
      <div class="box">5</div>
      <div class="box">6</div>
    </div>
  </body>
</html>
