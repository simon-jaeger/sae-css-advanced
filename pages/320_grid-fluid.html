<!DOCTYPE html>
<html lang="de-ch">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="/css/style.css" />
  </head>

  <body>
    <section
      style="
        padding: 8px;
        border: 1px dashed;
        margin-bottom: 24px;
        display: grid;
        gap: 8px;
        grid-template-columns: 1fr 1fr 1fr;
      "
    >
      <div style="background: #999; padding: 20px;"></div>
      <div style="background: #999; padding: 20px;"></div>
      <div style="background: #999; padding: 20px;"></div>
      <div style="background: #999; padding: 20px;"></div>
      <div style="background: #999; padding: 20px;"></div>
      <div style="background: #999; padding: 20px;"></div>
    </section>

    <section
      style="
        padding: 8px;
        border: 1px dashed;
        margin-bottom: 24px;
        display: grid;
        gap: 8px;
        grid-template-columns: 1fr 1fr;
      "
    >
      <div style="background: #999; padding: 20px;"></div>
      <div style="background: #999; padding: 20px;"></div>
    </section>

    <section
      style="
        padding: 8px;
        border: 1px dashed;
        margin-bottom: 24px;
        display: grid;
        gap: 8px;
        grid-template-columns: repeat(4, 1fr);
      "
    >
      <div style="background: #999; padding: 20px;"></div>
      <div style="background: #999; padding: 20px;"></div>
      <div style="background: #999; padding: 20px;"></div>
      <div style="background: #999; padding: 20px;"></div>
    </section>
  </body>
</html>
