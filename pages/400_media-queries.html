<!DOCTYPE html>
<html lang="de-ch">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="/css/style.css" />
    <style>
      /* default */
      body {
        background: #eef;
        color: #004;
      }

      /* if print */
      @media print {
        body {
          background: transparent;
          color: #000;
        }
      }

      /* if dark mode (macos --> appearance) */
      @media (prefers-color-scheme: dark) {
        body {
          background: #000;
          color: #fff;
        }
      }
    </style>
  </head>

  <body>
    <h1>media queries</h1>
    <p>css that only runs when certain conditions are met.</p>
  </body>
</html>
