<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>mario</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        background-color: black;
        color: white;
        font-family: "Press Start 2P", monospace;
        margin: 0;
      }
      .level {
        background-color: #5c93fc;
        display: grid;
        width: max-content;
        image-rendering: pixelated;
        grid-template-columns: repeat(20, 16px);
        grid-template-rows: repeat(10, 16px);
      }
      .ground {
        background-image: url("sprites/ground.png");
        background-repeat: repeat;
      }
      .block {
        background-image: url("sprites/block.png");
        background-repeat: repeat;
      }
      .brick {
        background-image: url("sprites/brick.png");
        background-repeat: repeat;
      }
      .question {
        background-image: url("sprites/question.png");
        background-repeat: repeat;
      }
      .goomba {
        background-image: url("sprites/goomba.png");
        background-repeat: repeat;
      }
      .mario {
        background-image: url("sprites/mario.png");
        background-repeat: repeat;
      }

      .ui {
        box-sizing: border-box;
        position: absolute;
        top: 0;
        width: 320px;
        font-size: 8px;
        padding: 8px;
        display: flex;
        justify-content: space-between;
      }
    </style>
  </head>
  <body>
    <div class="level">
      <div class="ground" style="grid-column: 1/-1; grid-row: 9/11"></div>

      <div class="brick" style="grid-column: 4; grid-row: 6"></div>
      <div class="question" style="grid-column: 5; grid-row: 6"></div>
      <div class="brick" style="grid-column: 6; grid-row: 6"></div>

      <div class="block" style="grid-column: 12; grid-row: 8"></div>
      <div class="block" style="grid-column: 13; grid-row: 7/9"></div>
      <div class="block" style="grid-column: 14; grid-row: 8"></div>

      <div class="goomba" style="grid-column: 10; grid-row: 8"></div>

      <div class="mario" style="grid-column: 2; grid-row: 8"></div>
    </div>

    <div class="ui">
      <span>Mario</span>
      <span>World 1-1</span>
      <span>Time 300</span>
    </div>
  </body>
</html>
