<!DOCTYPE html>
<html lang="de-ch">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Limits</title>
    <link rel="stylesheet" href="/000-shared/reset.css" />
    <link rel="stylesheet" href="/000-shared/variables.css" />
    <style>
      body {
        background: var(--gray9);
        color: var(--gray3);
        padding: 16px;
      }
      body > * {
        margin-bottom: 16px;
      }
    </style>
  </head>
  <body>
    <div
      style="
        height: clamp(100px, 50vh, 300px);
        background: var(--gray7);
        border-top: 1px solid var(--gray5);
        padding: 16px;
        border-top: 1px solid var(--gray5);
        text-transform: uppercase;
      "
    >Clamp</div>

    <h1
      style="
        max-width: 200px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      "
    >
      Dieser Titel kann sehr lang sein, und soll dann zugeschnitten werden.
    </h1>
  </body>
</html>
