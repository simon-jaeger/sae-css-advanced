<!DOCTYPE html>
<html lang="de-ch">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bilder</title>
    <link rel="stylesheet" href="/000-shared/reset.css" />
    <link rel="stylesheet" href="/000-shared/variables.css" />
    <style>
      body {
        background: var(--gray9);
        color: var(--gray3);
        padding: 16px;
      }
      body > * {
        margin-bottom: 16px;
      }
    </style>
  </head>
  <body>
    <!-- Intrinsische Grösse -->
    <img src="https://via.placeholder.com/400x100" alt="placeholder" />

    <!-- Explizite Grösse -->

    <!-- initial (default) -->
    <img
      src="https://via.placeholder.com/400x100"
      alt="placeholder"
      style="width: 100px; height: 100px; object-fit: initial"
    />

    <!-- cover -->
    <img
      src="https://via.placeholder.com/400x100"
      alt="placeholder"
      style="width: 100px; height: 100px; object-fit: cover"
    />

    <!-- contain -->
    <img
      src="https://via.placeholder.com/400x100"
      alt="placeholder"
      style="
        width: 100px;
        height: 100px;
        object-fit: contain;
        border: 1px solid currentColor;
      "
    />
  </body>
</html>
